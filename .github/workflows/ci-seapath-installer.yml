name: seapath-live-installer CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  workflow_dispatch:

jobs:
  seapath-live-installer-build:
    runs-on:  seapath-installer-builder
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl git sudo
      - name: Install cqfd
        run: |
          git clone https://github.com/savoirfairelinux/cqfd.git
          cd cqfd
          sudo make install
      - name: Initialize cqfd
        run: |
          cqfd init
      - name: Build empty seapath-live-installer
        run: |
          cqfd -b ci_empty
      - name: Build seapath-live-installer
        run: |
          cqfd -b ci
